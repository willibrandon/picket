name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release.
        required: true
        type: string

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Restore
        run: dotnet restore Picket.slnx --locked-mode

      - name: Install docs dependencies
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Verify formatting
        run: dotnet format Picket.slnx --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build Picket.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution Picket.slnx --configuration Release --no-restore

      - name: Check generated docs
        run: pnpm --dir docs-site docs:check

      - name: Smoke test GitHub Action
        id: action-smoke
        uses: ./
        with:
          path: tests/fixtures/github-secret-scanning
          cache: "false"
          report-directory: ${{ runner.temp }}/picket-action-smoke
          fail-on: never
          summary: "false"
          upload-sarif: "false"
          annotations: "false"
          setup-dotnet: "false"

      - name: Verify GitHub Action smoke outputs
        shell: pwsh
        run: |
          if ('${{ steps.action-smoke.outputs.exit-code }}' -ne '0') {
            throw "GitHub Action smoke returned exit code ${{ steps.action-smoke.outputs.exit-code }}."
          }

          if ('${{ steps.action-smoke.outputs.findings }}' -ne '0') {
            throw "GitHub Action smoke reported ${{ steps.action-smoke.outputs.findings }} findings."
          }

          $reportDirectory = Join-Path $env:RUNNER_TEMP 'picket-action-smoke'
          foreach ($fileName in @('picket.sarif', 'picket.jsonl')) {
            $path = Join-Path $reportDirectory $fileName
            if (!(Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "GitHub Action smoke did not write $fileName."
            }
          }

  build-binaries:
    name: Build binaries (${{ matrix.rid }})
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive-extension: tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            archive-extension: tar.gz
          - os: ubuntu-latest
            rid: linux-musl-x64
            archive-extension: tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-musl-arm64
            archive-extension: tar.gz
          - os: windows-latest
            rid: win-x64
            archive-extension: zip
          - os: windows-11-arm
            rid: win-arm64
            archive-extension: zip
          - os: macos-26-intel
            rid: osx-x64
            archive-extension: tar.gz
          - os: macos-26
            rid: osx-arm64
            archive-extension: tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Restore
        run: dotnet restore Picket.slnx --locked-mode

      - name: Install Linux musl Native AOT dependencies
        if: startsWith(matrix.rid, 'linux-musl-')
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true install -y musl-tools zstd

      - name: Build Linux musl zstandard runtime
        if: startsWith(matrix.rid, 'linux-musl-')
        shell: pwsh
        run: |
          $outputDirectory = Join-Path $env:RUNNER_TEMP "picket-zstd-${{ matrix.rid }}"
          dotnet run --file ./scripts/Build-ZstandardMusl.cs -- -OutputDirectory $outputDirectory
          "PICKET_ZSTANDARD_MUSL_LIBRARY=$(Join-Path $outputDirectory 'libzstd.so')" >> $env:GITHUB_ENV

      - name: Publish Native AOT binaries
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid NuGet version."
          }

          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-publish-${{ matrix.rid }}"
          if ('${{ matrix.rid }}'.StartsWith('linux-musl-', [StringComparison]::Ordinal)) {
            $packageOutput = Join-Path $env:RUNNER_TEMP "picket-tool-packages-${{ matrix.rid }}"
            dotnet run --file ./scripts/Publish-LinuxMusl.cs -- -RuntimeIdentifier '${{ matrix.rid }}' -OutputDirectory $publishOutput -ToolPackageOutputDirectory $packageOutput -ZstandardLibrary $env:PICKET_ZSTANDARD_MUSL_LIBRARY -Version $version
          }
          else {
            dotnet publish src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r ${{ matrix.rid }} --no-restore -o $publishOutput
            dotnet publish src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r ${{ matrix.rid }} --no-restore -o $publishOutput
          }

          $symbolArtifacts = @(
            Get-ChildItem -LiteralPath $publishOutput -Recurse -Force |
              Where-Object { $_.Name -match '\.(pdb|dbg|dwarf)$' -or $_.Name.EndsWith('.dSYM', [StringComparison]::OrdinalIgnoreCase) }
          )
          if ($symbolArtifacts.Count -ne 0) {
            throw "release-speed publish produced public debug symbols: $($symbolArtifacts.FullName -join ', ')"
          }

      - name: Test Native AOT compatibility oracles
        if: ${{ !startsWith(matrix.rid, 'linux-musl-') }}
        shell: pwsh
        run: |
          $executableName = if ($IsWindows) { 'picket.exe' } else { 'picket' }
          $env:PICKET_TEST_CLI_PATH = Join-Path $env:RUNNER_TEMP "picket-publish-${{ matrix.rid }}/$executableName"
          dotnet test --project tests/Picket.Tests/Picket.Tests.csproj --configuration Release --no-restore --filter "FullyQualifiedName~Picket.Tests.CompatibilityOracleFixtureTests"

      - name: Smoke test Linux musl zstandard scan
        if: startsWith(matrix.rid, 'linux-musl-')
        shell: pwsh
        run: |
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-publish-${{ matrix.rid }}"
          $fixtureDirectory = Join-Path $env:RUNNER_TEMP "picket-zstd-smoke-${{ matrix.rid }}"
          $sourcePath = Join-Path $fixtureDirectory 'secret.txt'
          $archivePath = "$sourcePath.zst"
          $runtimeImage = 'mcr.microsoft.com/dotnet/runtime-deps@sha256:297e573be253dafcba4eee8ab29e8e05ab3c5f13f966b3537af2256864de5668'
          New-Item -ItemType Directory -Force -Path $fixtureDirectory | Out-Null
          Set-Content -LiteralPath $sourcePath -NoNewline -Encoding utf8NoBOM -Value ('aws_access_key_id = ' + 'AKIA' + 'ABCDEFGHIJKLMNOP')
          & zstd -q -f $sourcePath -o $archivePath
          if ($LASTEXITCODE -ne 0) {
            throw "zstd fixture creation failed with exit code $LASTEXITCODE."
          }

          $scanOutput = & docker run --rm --read-only --network none --user 65534:65534 --volume "${publishOutput}:/picket:ro" --volume "${fixtureDirectory}:/fixtures:ro" $runtimeImage /picket/picket scan /fixtures/secret.txt.zst --report-format jsonl --redact=100 2>&1
          $scanExitCode = $LASTEXITCODE
          $scanText = $scanOutput -join "`n"
          if ($scanText.Length -gt 4096) {
            $scanText = $scanText.Substring(0, 4096)
          }

          if ($scanExitCode -ne 1) {
            throw "musl zstandard scan returned exit code ${scanExitCode}: $scanText"
          }

          if ($scanText -notmatch '"ruleId":"aws-access-token"') {
            throw 'musl zstandard scan did not report the expected finding.'
          }

          $global:LASTEXITCODE = 0

      - name: Test Linux musl compatibility oracle
        if: startsWith(matrix.rid, 'linux-musl-')
        shell: pwsh
        run: |
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-publish-${{ matrix.rid }}"
          $inputRoot = Join-Path $PWD 'tests/fixtures/oracle-inputs/basic-dir-json'
          $expectedPath = Join-Path $PWD 'tests/fixtures/oracles/basic-dir-json/gitleaks.json'
          $outputDirectory = Join-Path $env:RUNNER_TEMP "picket-musl-oracle-${{ matrix.rid }}"
          $reportPath = Join-Path $outputDirectory 'report.json'
          $runtimeImage = 'mcr.microsoft.com/dotnet/runtime-deps@sha256:297e573be253dafcba4eee8ab29e8e05ab3c5f13f966b3537af2256864de5668'
          New-Item -ItemType Directory -Force -Path $outputDirectory | Out-Null
          & chmod 0777 $outputDirectory

          $scanOutput = & docker run --rm --read-only --network none --user 65534:65534 --workdir /fixtures --volume "${publishOutput}:/picket:ro" --volume "${inputRoot}:/fixtures:ro" --volume "${outputDirectory}:/output" $runtimeImage /picket/picket dir . -c .gitleaks.toml -f json -r /output/report.json --no-banner --no-color --redact=100 2>&1
          $scanExitCode = $LASTEXITCODE
          if ($scanExitCode -ne 1) {
            throw "musl compatibility oracle returned exit code ${scanExitCode}: $($scanOutput -join "`n")"
          }

          $expected = [Convert]::ToBase64String([IO.File]::ReadAllBytes($expectedPath))
          $actual = [Convert]::ToBase64String([IO.File]::ReadAllBytes($reportPath))
          if ($actual -ne $expected) {
            throw 'musl compatibility oracle report differs from the promoted Gitleaks report.'
          }

          $global:LASTEXITCODE = 0

      - name: Package binary archive
        id: package
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $archiveName = "picket-$env:RELEASE_TAG-$rid.${{ matrix.archive-extension }}"
          $payload = Join-Path $env:RUNNER_TEMP "picket-payload-$rid"
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-publish-$rid"
          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          $archivePath = Join-Path $staging $archiveName

          New-Item -ItemType Directory -Force -Path $payload, $staging | Out-Null
          Copy-Item -Path (Join-Path $publishOutput '*') -Destination $payload -Recurse
          Copy-Item -LiteralPath LICENSE -Destination $payload

          if ('${{ matrix.archive-extension }}' -eq 'zip') {
            Compress-Archive -Path (Join-Path $payload '*') -DestinationPath $archivePath -Force
          }
          else {
            tar -C $payload -czf $archivePath .
          }

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "$archivePath.sha256"
          Set-Content -LiteralPath $checksumPath -Encoding utf8NoBOM -Value "$hash  $archiveName"

          "archive-path=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum-path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Pack Native AOT tool packages
        id: tool-package
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid NuGet version."
          }

          $rid = '${{ matrix.rid }}'
          $packageOutput = Join-Path $env:RUNNER_TEMP "picket-tool-packages-$rid"
          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          $archiveName = "picket-$env:RELEASE_TAG-nuget-$rid.zip"
          $archivePath = Join-Path $staging $archiveName

          New-Item -ItemType Directory -Force -Path $packageOutput, $staging | Out-Null
          if (!$rid.StartsWith('linux-musl-', [StringComparison]::Ordinal)) {
            dotnet pack src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r $rid --no-restore -o $packageOutput
            dotnet pack src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r $rid --no-restore -o $packageOutput
          }

          Compress-Archive -Path (Join-Path $packageOutput '*') -DestinationPath $archivePath -Force
          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "$archivePath.sha256"
          Set-Content -LiteralPath $checksumPath -Encoding utf8NoBOM -Value "$hash  $archiveName"

          "archive-path=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum-path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Generate binary artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.archive-path }}

      - name: Generate Native AOT tool package attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.tool-package.outputs.archive-path }}

      - name: Upload binary release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-binaries-${{ matrix.rid }}
          path: |
            ${{ steps.package.outputs.archive-path }}
            ${{ steps.package.outputs.checksum-path }}
          if-no-files-found: error

      - name: Upload Native AOT tool package assets
        uses: actions/upload-artifact@v6
        with:
          name: release-nuget-${{ matrix.rid }}
          path: |
            ${{ steps.tool-package.outputs.archive-path }}
            ${{ steps.tool-package.outputs.checksum-path }}
          if-no-files-found: error

  build-packages:
    name: Build NuGet package archive
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Restore
        run: dotnet restore Picket.slnx --locked-mode

      - name: Pack public packages
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid NuGet version."
          }

          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-packages'
          New-Item -ItemType Directory -Force -Path $packageOutput | Out-Null

          dotnet pack src/Picket.Rules/Picket.Rules.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Engine/Picket.Engine.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Compat/Picket.Compat.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Report/Picket.Report.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Security/Picket.Security.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -p:IncludeSymbols=false -o $packageOutput
          dotnet pack src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -p:IncludeSymbols=false -o $packageOutput

      - name: Package NuGet artifacts
        id: package
        shell: pwsh
        run: |
          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-packages'
          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          $archiveName = "picket-$env:RELEASE_TAG-nuget.zip"
          $archivePath = Join-Path $staging $archiveName

          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Compress-Archive -Path (Join-Path $packageOutput '*') -DestinationPath $archivePath -Force

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "$archivePath.sha256"
          Set-Content -LiteralPath $checksumPath -Encoding utf8NoBOM -Value "$hash  $archiveName"

          "archive-path=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum-path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Generate NuGet artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.archive-path }}

      - name: Upload NuGet release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-nuget
          path: |
            ${{ steps.package.outputs.archive-path }}
            ${{ steps.package.outputs.checksum-path }}
          if-no-files-found: error

  publish-nuget:
    name: Publish NuGet packages
    needs:
      - build-binaries
      - build-packages
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-nuget*
          path: dist
          merge-multiple: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.301

      - name: Publish packages to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'NUGET_API_KEY is required to publish NuGet packages.'
          }

          $archives = @(Get-ChildItem -LiteralPath dist -Filter 'picket-*-nuget*.zip' -File | Sort-Object Name)
          if ($archives.Count -eq 0) {
            throw 'NuGet package archives were not downloaded.'
          }

          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-nuget-publish'
          New-Item -ItemType Directory -Force -Path $packageOutput | Out-Null
          foreach ($archive in $archives) {
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $packageOutput -Force
          }

          $packages = @(Get-ChildItem -LiteralPath $packageOutput -Filter '*.nupkg' -File | Sort-Object Name)
          if ($packages.Count -eq 0) {
            throw 'NuGet package archive did not contain .nupkg files.'
          }

          $pointerPackages = @($packages | Where-Object {
            $_.Name -match '^Picket\.\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?\.nupkg$' -or
            $_.Name -match '^Picket\.Tui\.Cli\.\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?\.nupkg$'
          })
          $pointerPaths = @($pointerPackages | ForEach-Object FullName)
          $nonPointerPackages = @($packages | Where-Object { $pointerPaths -notcontains $_.FullName })
          $libraryPackagePrefixes = @(
            'Picket.Rules.',
            'Picket.Engine.',
            'Picket.Compat.',
            'Picket.Report.',
            'Picket.Security.'
          )
          $libraryPackages = @(
            foreach ($prefix in $libraryPackagePrefixes) {
              $nonPointerPackages | Where-Object { $_.Name.StartsWith($prefix, [StringComparison]::Ordinal) }
            }
          )
          $libraryPaths = @($libraryPackages | ForEach-Object FullName)
          $runtimePackages = @($nonPointerPackages | Where-Object { $libraryPaths -notcontains $_.FullName })

          foreach ($package in $libraryPackages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

          foreach ($package in $runtimePackages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

          foreach ($package in $pointerPackages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

          $symbols = @(Get-ChildItem -LiteralPath $packageOutput -Filter '*.snupkg' -File | Sort-Object Name)
          foreach ($symbol in $symbols) {
            dotnet nuget push $symbol.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

  build-msi:
    name: Build Windows MSI installers
    needs: build-binaries
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.301

      - name: Install WiX
        shell: pwsh
        run: dotnet tool install --tool-path (Join-Path $env:RUNNER_TEMP 'wix') wix --version 6.0.2

      - name: Download Windows release archives
        uses: actions/download-artifact@v5
        with:
          pattern: release-binaries-win-*
          path: dist
          merge-multiple: true

      - name: Build MSI installers
        id: msi
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid MSI version."
          }

          if ($version.Contains('-', [StringComparison]::Ordinal)) {
            Write-Host "Skipping MSI installers for prerelease tag $env:RELEASE_TAG because Windows Installer ProductVersion does not support prerelease labels."
            "created=false" >> $env:GITHUB_OUTPUT
            return
          }

          $wix = Join-Path $env:RUNNER_TEMP 'wix\wix.exe'
          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          foreach ($rid in @('win-x64', 'win-arm64')) {
            $archiveName = "picket-$env:RELEASE_TAG-$rid.zip"
            $archive = Get-ChildItem -LiteralPath dist -Filter $archiveName -File | Select-Object -First 1
            if ($null -eq $archive) {
              throw "Windows release archive $archiveName was not downloaded."
            }

            $payload = Join-Path $env:RUNNER_TEMP "picket-msi-payload-$rid"
            if (Test-Path -LiteralPath $payload) {
              Remove-Item -LiteralPath $payload -Recurse -Force
            }

            New-Item -ItemType Directory -Force -Path $payload | Out-Null
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $payload -Force

            foreach ($fileName in @('picket.exe', 'picket-tui.exe', 'libzstd.dll', 'LICENSE', 'THIRD-PARTY-NOTICES.txt')) {
              $path = Join-Path $payload $fileName
              if (!(Test-Path -LiteralPath $path -PathType Leaf)) {
                throw "$archiveName does not contain $fileName."
              }
            }

            $architecture = if ($rid -eq 'win-arm64') { 'arm64' } else { 'x64' }
            $msiName = "picket-$env:RELEASE_TAG-$rid.msi"
            $msiPath = Join-Path $staging $msiName
            & $wix build packaging/msi/Picket.wxs -arch $architecture -d "Version=$version" -d "PayloadDir=$payload" -out $msiPath -pdbtype none
            if ($LASTEXITCODE -ne 0) {
              throw "WiX failed to build $msiName."
            }

            $installRoot = Join-Path $env:RUNNER_TEMP "picket-msi-install-$rid"
            & msiexec.exe /i $msiPath /qn /norestart "INSTALLFOLDER=$installRoot"
            if ($LASTEXITCODE -ne 0) {
              throw "Installing $msiName failed with exit code $LASTEXITCODE."
            }

            try {
              foreach ($fileName in @('picket.exe', 'picket-tui.exe', 'libzstd.dll', 'LICENSE', 'THIRD-PARTY-NOTICES.txt')) {
                if (!(Test-Path -LiteralPath (Join-Path $installRoot $fileName) -PathType Leaf)) {
                  throw "$msiName did not install $fileName."
                }
              }

              $zstandardFixture = Join-Path $env:RUNNER_TEMP "picket-msi-zstd-$rid.zst"
              [IO.File]::WriteAllBytes($zstandardFixture, [Convert]::FromBase64String('KLUv/SQoQQEAYXdzX2FjY2Vzc19rZXlfaWQgPSBBS0lBQUJDREVGR0hJSktMTU5PUJrlerI='))
              $scanOutput = & (Join-Path $installRoot 'picket.exe') scan $zstandardFixture --report-format jsonl --redact=100 2>&1
              $scanExitCode = $LASTEXITCODE
              $scanText = $scanOutput -join "`n"
              if ($scanExitCode -ne 1 -or $scanText -notmatch '"ruleId":"aws-access-token"') {
                throw "$msiName zstandard smoke scan failed with exit code ${scanExitCode}: $scanText"
              }

              $global:LASTEXITCODE = 0
            }
            finally {
              & msiexec.exe /x $msiPath /qn /norestart
              if ($LASTEXITCODE -ne 0) {
                throw "Uninstalling $msiName failed with exit code $LASTEXITCODE."
              }
            }

            $hash = (Get-FileHash -LiteralPath $msiPath -Algorithm SHA256).Hash.ToLowerInvariant()
            Set-Content -LiteralPath "$msiPath.sha256" -Encoding utf8NoBOM -Value "$hash  $msiName"
          }

          "created=true" >> $env:GITHUB_OUTPUT

      - name: Generate MSI artifact attestation
        if: steps.msi.outputs.created == 'true'
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/picket-release-assets/*.msi

      - name: Upload MSI release assets
        if: steps.msi.outputs.created == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: release-msi
          path: |
            ${{ runner.temp }}/picket-release-assets/*.msi
            ${{ runner.temp }}/picket-release-assets/*.msi.sha256
          if-no-files-found: error

  build-azure-devops-extension:
    name: Build Azure DevOps VSIX
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: azure-devops/package-lock.json

      - name: Install Azure DevOps packaging dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: azure-devops

      - name: Test Azure DevOps task
        run: node --test azure-devops/tasks/PicketScanV1/index.test.js

      - name: Build Azure DevOps VSIX
        id: vsix
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid extension version."
          }

          if ($version.Contains('-', [StringComparison]::Ordinal)) {
            Write-Host "Skipping Azure DevOps VSIX for prerelease tag $env:RELEASE_TAG because extension manifest versions do not support prerelease labels."
            "created=false" >> $env:GITHUB_OUTPUT
            return
          }

          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-azure-devops-vsix'
          New-Item -ItemType Directory -Force -Path $staging, $packageOutput | Out-Null

          Push-Location azure-devops
          try {
            $override = @{ version = $version } | ConvertTo-Json -Compress
            npm exec -- tfx extension create --manifest-globs vss-extension.json --output-path $packageOutput --rev-version false --override $override --no-color
            if ($LASTEXITCODE -ne 0) {
              throw 'Azure DevOps VSIX packaging failed.'
            }
          }
          finally {
            Pop-Location
          }

          $vsix = Get-ChildItem -LiteralPath $packageOutput -Filter '*.vsix' -File | Select-Object -First 1
          if ($null -eq $vsix) {
            throw 'Azure DevOps VSIX package was not produced.'
          }

          $vsixName = "picket-$env:RELEASE_TAG-azure-devops.vsix"
          $vsixPath = Join-Path $staging $vsixName
          Copy-Item -LiteralPath $vsix.FullName -Destination $vsixPath -Force

          $hash = (Get-FileHash -LiteralPath $vsixPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$vsixPath.sha256" -Encoding utf8NoBOM -Value "$hash  $vsixName"
          "created=true" >> $env:GITHUB_OUTPUT

      - name: Generate Azure DevOps VSIX artifact attestation
        if: steps.vsix.outputs.created == 'true'
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/picket-release-assets/*.vsix

      - name: Upload Azure DevOps VSIX release assets
        if: steps.vsix.outputs.created == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: release-azure-devops-vsix
          path: |
            ${{ runner.temp }}/picket-release-assets/*.vsix
            ${{ runner.temp }}/picket-release-assets/*.vsix.sha256
          if-no-files-found: error

  validate-container-images:
    name: Validate container image (${{ matrix.rid }})
    needs: build-binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            platform: linux/arm64
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download native Linux archive
        uses: actions/download-artifact@v5
        with:
          name: release-binaries-${{ matrix.rid }}
          path: dist

      - name: Build and smoke test image
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid container version."
          }

          $archive = Get-ChildItem -LiteralPath dist -Filter "picket-$env:RELEASE_TAG-${{ matrix.rid }}.tar.gz" -File | Select-Object -First 1
          if ($null -eq $archive) {
            throw 'Native Linux release archive was not downloaded.'
          }

          $context = Join-Path $env:RUNNER_TEMP 'picket-container-context'
          New-Item -ItemType Directory -Force -Path $context | Out-Null
          tar -C $context -xzf $archive.FullName
          if ($LASTEXITCODE -ne 0) {
            throw 'Native Linux release archive extraction failed.'
          }

          foreach ($fileName in @('picket', 'picket-tui', 'libzstd.so', 'LICENSE', 'THIRD-PARTY-NOTICES.txt')) {
            if (!(Test-Path -LiteralPath (Join-Path $context $fileName) -PathType Leaf)) {
              throw "Container payload does not contain $fileName."
            }
          }

          $image = 'picket-release-validation:${{ matrix.rid }}'
          $revision = (git rev-parse HEAD).Trim()
          docker buildx build --file packaging/container/Dockerfile --platform '${{ matrix.platform }}' --build-arg "VERSION=$version" --label "org.opencontainers.image.revision=$revision" --tag $image --load $context
          if ($LASTEXITCODE -ne 0) {
            throw 'Container image build failed.'
          }

          docker run --rm --network none $image version
          if ($LASTEXITCODE -ne 0) {
            throw 'Container scanner smoke test failed.'
          }

          docker run --rm --network none --entrypoint /bin/sh $image -c 'test -x /usr/local/bin/picket-tui && test -f /usr/local/bin/libzstd.so && test -f /licenses/Picket/THIRD-PARTY-NOTICES.txt'
          if ($LASTEXITCODE -ne 0) {
            throw 'Container payload smoke test failed.'
          }

  publish-container-architectures:
    name: Publish container architecture (${{ matrix.rid }})
    needs:
      - build-binaries
      - publish-release
      - validate-container-images
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            platform: linux/amd64
            suffix: amd64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download native Linux archive
        uses: actions/download-artifact@v5
        with:
          name: release-binaries-${{ matrix.rid }}
          path: dist

      - name: Log in to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Publish architecture image
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid container version."
          }

          $archive = Get-ChildItem -LiteralPath dist -Filter "picket-$env:RELEASE_TAG-${{ matrix.rid }}.tar.gz" -File | Select-Object -First 1
          if ($null -eq $archive) {
            throw 'Native Linux release archive was not downloaded.'
          }

          $context = Join-Path $env:RUNNER_TEMP 'picket-container-context'
          New-Item -ItemType Directory -Force -Path $context | Out-Null
          tar -C $context -xzf $archive.FullName
          if ($LASTEXITCODE -ne 0) {
            throw 'Native Linux release archive extraction failed.'
          }

          $repository = $env:GITHUB_REPOSITORY.ToLowerInvariant()
          $image = "ghcr.io/$repository`:$version-${{ matrix.suffix }}"
          $revision = (git rev-parse HEAD).Trim()
          docker buildx build --file packaging/container/Dockerfile --platform '${{ matrix.platform }}' --build-arg "VERSION=$version" --label "org.opencontainers.image.revision=$revision" --label "org.opencontainers.image.created=$((Get-Date).ToUniversalTime().ToString('o'))" --tag $image --sbom=true --provenance=true --push $context
          if ($LASTEXITCODE -ne 0) {
            throw 'Container architecture publish failed.'
          }

  publish-container:
    name: Publish container manifest
    needs: publish-container-architectures
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Publish version manifests
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          $repository = $env:GITHUB_REPOSITORY.ToLowerInvariant()
          $image = "ghcr.io/$repository"
          docker buildx imagetools create --tag "$image`:$env:RELEASE_TAG" --tag "$image`:$version" "$image`:$version-amd64" "$image`:$version-arm64"
          if ($LASTEXITCODE -ne 0) {
            throw 'Container manifest publish failed.'
          }

          docker buildx imagetools inspect "$image`:$version"

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-binaries
      - build-packages
      - build-azure-devops-extension
      - build-msi
      - validate-container-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.301

      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Build release utility apps
        shell: pwsh
        run: |
          dotnet build ./scripts/Generate-PackageManagerManifests.cs --nologo --verbosity quiet
          dotnet build ./scripts/Generate-ReleaseArtifactManifest.cs --nologo --verbosity quiet

      - name: Write aggregate checksums
        shell: pwsh
        run: |
          $assets = Get-ChildItem -LiteralPath dist -File |
            Where-Object {
              !$_.Name.EndsWith('.sha256', [StringComparison]::Ordinal) -and
              !$_.Name.Equals('checksums.txt', [StringComparison]::Ordinal)
            } |
            Sort-Object Name

          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath $asset.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($asset.Name)"
          }

          Set-Content -LiteralPath (Join-Path 'dist' 'checksums.txt') -Encoding utf8NoBOM -Value $lines

      - name: Generate package-manager manifests
        shell: pwsh
        run: |
          $manifestRoot = Join-Path $env:RUNNER_TEMP 'picket-package-manager-manifests'
          dotnet run --file ./scripts/Generate-PackageManagerManifests.cs --no-build -- -ReleaseTag $env:RELEASE_TAG -ChecksumsPath (Join-Path 'dist' 'checksums.txt') -OutputDirectory $manifestRoot -Clean

          $archiveName = "picket-$env:RELEASE_TAG-package-manager-manifests.zip"
          $archivePath = Join-Path 'dist' $archiveName
          Compress-Archive -Path (Join-Path $manifestRoot '*') -DestinationPath $archivePath -Force

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$archivePath.sha256" -Encoding utf8NoBOM -Value "$hash  $archiveName"

      - name: Generate release artifact manifest
        shell: pwsh
        run: dotnet run --file ./scripts/Generate-ReleaseArtifactManifest.cs --no-build -- -Directory dist -ReleaseTag $env:RELEASE_TAG

      - name: Refresh aggregate checksums
        shell: pwsh
        run: |
          $assets = Get-ChildItem -LiteralPath dist -File |
            Where-Object {
              !$_.Name.EndsWith('.sha256', [StringComparison]::Ordinal) -and
              !$_.Name.Equals('checksums.txt', [StringComparison]::Ordinal)
            } |
            Sort-Object Name

          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath $asset.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($asset.Name)"
          }

          Set-Content -LiteralPath (Join-Path 'dist' 'checksums.txt') -Encoding utf8NoBOM -Value $lines

      - name: Generate checksum attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/checksums.txt

      - name: Generate release artifact manifest attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/release-artifacts.json

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath dist -File | Sort-Object Name
          if ($assets.Count -eq 0) {
            throw 'No release assets were produced.'
          }

          $assetPaths = @($assets | ForEach-Object { $_.FullName })
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY >$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
          }
          else {
            gh release create $env:RELEASE_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --verify-tag --title "Picket $env:RELEASE_TAG" --notes "Release artifacts include SHA-256 checksums, package-size metadata, and GitHub artifact attestations."
          }

  publish-container-latest:
    name: Publish latest container tag
    if: ${{ !contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}
    needs:
      - publish-container
      - publish-nuget
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Advance latest tag
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          $repository = $env:GITHUB_REPOSITORY.ToLowerInvariant()
          $image = "ghcr.io/$repository"
          docker buildx imagetools create --tag "$image`:latest" "$image`:$version"
          if ($LASTEXITCODE -ne 0) {
            throw 'Latest container tag publish failed.'
          }

          docker buildx imagetools inspect "$image`:latest"
