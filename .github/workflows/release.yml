name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release.
        required: true
        type: string

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Restore
        run: dotnet restore Picket.slnx

      - name: Install docs dependencies
        run: pnpm --dir docs-site install --frozen-lockfile

      - name: Verify formatting
        run: dotnet format Picket.slnx --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build Picket.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution Picket.slnx --configuration Release --no-restore

      - name: Check generated docs
        run: pnpm --dir docs-site docs:check

      - name: Smoke test GitHub Action
        id: action-smoke
        uses: ./
        with:
          path: tests/fixtures/github-secret-scanning
          cache: "false"
          report-directory: ${{ runner.temp }}/picket-action-smoke
          fail-on: never
          summary: "false"
          upload-sarif: "false"
          annotations: "false"
          setup-dotnet: "false"

      - name: Verify GitHub Action smoke outputs
        shell: pwsh
        run: |
          if ('${{ steps.action-smoke.outputs.exit-code }}' -ne '0') {
            throw "GitHub Action smoke returned exit code ${{ steps.action-smoke.outputs.exit-code }}."
          }

          if ('${{ steps.action-smoke.outputs.findings }}' -ne '0') {
            throw "GitHub Action smoke reported ${{ steps.action-smoke.outputs.findings }} findings."
          }

          $reportDirectory = Join-Path $env:RUNNER_TEMP 'picket-action-smoke'
          foreach ($fileName in @('picket.sarif', 'picket.jsonl')) {
            $path = Join-Path $reportDirectory $fileName
            if (!(Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "GitHub Action smoke did not write $fileName."
            }
          }

  build-binaries:
    name: Build binaries (${{ matrix.rid }})
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive-extension: tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            archive-extension: tar.gz
          - os: ubuntu-latest
            rid: linux-musl-x64
            archive-extension: tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-musl-arm64
            archive-extension: tar.gz
          - os: windows-latest
            rid: win-x64
            archive-extension: zip
          - os: windows-11-arm
            rid: win-arm64
            archive-extension: zip
          - os: macos-26-intel
            rid: osx-x64
            archive-extension: tar.gz
          - os: macos-26
            rid: osx-arm64
            archive-extension: tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Restore
        run: dotnet restore Picket.slnx

      - name: Install Linux musl Native AOT dependencies
        if: startsWith(matrix.rid, 'linux-musl-')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Publish Native AOT binaries
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid NuGet version."
          }

          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-publish-${{ matrix.rid }}"
          dotnet publish src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r ${{ matrix.rid }} --no-restore -o $publishOutput
          dotnet publish src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r ${{ matrix.rid }} --no-restore -o $publishOutput

      - name: Package binary archive
        id: package
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $archiveName = "picket-$env:RELEASE_TAG-$rid.${{ matrix.archive-extension }}"
          $payload = Join-Path $env:RUNNER_TEMP "picket-payload-$rid"
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-publish-$rid"
          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          $archivePath = Join-Path $staging $archiveName

          New-Item -ItemType Directory -Force -Path $payload, $staging | Out-Null
          Copy-Item -Path (Join-Path $publishOutput '*') -Destination $payload -Recurse
          Copy-Item -LiteralPath LICENSE -Destination $payload

          if ('${{ matrix.archive-extension }}' -eq 'zip') {
            Compress-Archive -Path (Join-Path $payload '*') -DestinationPath $archivePath -Force
          }
          else {
            tar -C $payload -czf $archivePath .
          }

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "$archivePath.sha256"
          Set-Content -LiteralPath $checksumPath -Encoding utf8NoBOM -Value "$hash  $archiveName"

          "archive-path=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum-path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Pack Native AOT tool packages
        id: tool-package
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid NuGet version."
          }

          $rid = '${{ matrix.rid }}'
          $packageOutput = Join-Path $env:RUNNER_TEMP "picket-tool-packages-$rid"
          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          $archiveName = "picket-$env:RELEASE_TAG-nuget-$rid.zip"
          $archivePath = Join-Path $staging $archiveName

          New-Item -ItemType Directory -Force -Path $packageOutput, $staging | Out-Null
          dotnet pack src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r $rid --no-restore -o $packageOutput
          dotnet pack src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -p:Version=$version -p:PackageVersion=$version -r $rid --no-restore -o $packageOutput

          Compress-Archive -Path (Join-Path $packageOutput '*') -DestinationPath $archivePath -Force
          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "$archivePath.sha256"
          Set-Content -LiteralPath $checksumPath -Encoding utf8NoBOM -Value "$hash  $archiveName"

          "archive-path=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum-path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Generate binary artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.archive-path }}

      - name: Generate Native AOT tool package attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.tool-package.outputs.archive-path }}

      - name: Upload binary release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-binaries-${{ matrix.rid }}
          path: |
            ${{ steps.package.outputs.archive-path }}
            ${{ steps.package.outputs.checksum-path }}
          if-no-files-found: error

      - name: Upload Native AOT tool package assets
        uses: actions/upload-artifact@v6
        with:
          name: release-nuget-${{ matrix.rid }}
          path: |
            ${{ steps.tool-package.outputs.archive-path }}
            ${{ steps.tool-package.outputs.checksum-path }}
          if-no-files-found: error

  build-packages:
    name: Build NuGet package archive
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Restore
        run: dotnet restore Picket.slnx

      - name: Pack public packages
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if (!($version -match '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$')) {
            throw "Release tag '$env:RELEASE_TAG' does not contain a valid NuGet version."
          }

          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-packages'
          New-Item -ItemType Directory -Force -Path $packageOutput | Out-Null

          dotnet pack src/Picket.Rules/Picket.Rules.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Engine/Picket.Engine.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Report/Picket.Report.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Security/Picket.Security.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -o $packageOutput
          dotnet pack src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -p:IncludeSymbols=false -o $packageOutput
          dotnet pack src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:Version=$version -p:PackageVersion=$version -p:IncludeSymbols=false -o $packageOutput

      - name: Package NuGet artifacts
        id: package
        shell: pwsh
        run: |
          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-packages'
          $staging = Join-Path $env:RUNNER_TEMP 'picket-release-assets'
          $archiveName = "picket-$env:RELEASE_TAG-nuget.zip"
          $archivePath = Join-Path $staging $archiveName

          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Compress-Archive -Path (Join-Path $packageOutput '*') -DestinationPath $archivePath -Force

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "$archivePath.sha256"
          Set-Content -LiteralPath $checksumPath -Encoding utf8NoBOM -Value "$hash  $archiveName"

          "archive-path=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum-path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Generate NuGet artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.archive-path }}

      - name: Upload NuGet release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-nuget
          path: |
            ${{ steps.package.outputs.archive-path }}
            ${{ steps.package.outputs.checksum-path }}
          if-no-files-found: error

  publish-nuget:
    name: Publish NuGet packages
    needs:
      - build-binaries
      - build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-nuget*
          path: dist
          merge-multiple: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.301

      - name: Publish packages to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'NUGET_API_KEY is required to publish NuGet packages.'
          }

          $archives = @(Get-ChildItem -LiteralPath dist -Filter 'picket-*-nuget*.zip' -File | Sort-Object Name)
          if ($archives.Count -eq 0) {
            throw 'NuGet package archives were not downloaded.'
          }

          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-nuget-publish'
          New-Item -ItemType Directory -Force -Path $packageOutput | Out-Null
          foreach ($archive in $archives) {
            Expand-Archive -LiteralPath $archive.FullName -DestinationPath $packageOutput -Force
          }

          $packages = @(Get-ChildItem -LiteralPath $packageOutput -Filter '*.nupkg' -File | Sort-Object Name)
          if ($packages.Count -eq 0) {
            throw 'NuGet package archive did not contain .nupkg files.'
          }

          $pointerPackages = @($packages | Where-Object {
            $_.Name -match '^Picket\.\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?\.nupkg$' -or
            $_.Name -match '^Picket\.Tui\.Cli\.\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?\.nupkg$'
          })
          $pointerPaths = @($pointerPackages | ForEach-Object FullName)
          $nonPointerPackages = @($packages | Where-Object { $pointerPaths -notcontains $_.FullName })

          foreach ($package in $nonPointerPackages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

          foreach ($package in $pointerPackages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

          $symbols = @(Get-ChildItem -LiteralPath $packageOutput -Filter '*.snupkg' -File | Sort-Object Name)
          foreach ($symbol in $symbols) {
            dotnet nuget push $symbol.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-binaries
      - build-packages
      - publish-nuget
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Write aggregate checksums
        shell: pwsh
        run: |
          $assets = Get-ChildItem -LiteralPath dist -File |
            Where-Object { !$_.Name.EndsWith('.sha256', [StringComparison]::Ordinal) } |
            Sort-Object Name

          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath $asset.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($asset.Name)"
          }

          Set-Content -LiteralPath (Join-Path 'dist' 'checksums.txt') -Encoding utf8NoBOM -Value $lines

      - name: Generate checksum attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/checksums.txt

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath dist -File | Sort-Object Name
          if ($assets.Count -eq 0) {
            throw 'No release assets were produced.'
          }

          $assetPaths = @($assets | ForEach-Object { $_.FullName })
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY >$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
          }
          else {
            gh release create $env:RELEASE_TAG @assetPaths --repo $env:GITHUB_REPOSITORY --verify-tag --title "Picket $env:RELEASE_TAG" --notes "Release artifacts include SHA-256 checksums and GitHub artifact attestations."
          }
