name: Live GitHub Secret Scanning Oracle

on:
  workflow_dispatch:
    inputs:
      repository:
        description: GitHub repository to capture alerts from.
        required: true
        default: willibrandon/picket
      state:
        description: Secret scanning alert state.
        required: true
        type: choice
        options:
          - open
          - resolved
          - all
        default: open
      include-locations:
        description: Capture sanitized alert locations.
        required: true
        type: boolean
        default: true
      compare-current-checkout:
        description: Compare hosted alerts to a redacted native git-history scan of this checkout.
        required: true
        type: boolean
        default: true
      fail-on-difference:
        description: Fail when mapped hosted alerts are missing from the Picket report.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  capture:
    name: Live GitHub secret scanning oracle
    runs-on: ubuntu-latest
    env:
      PICKET_ORACLE_REPOSITORY: ${{ inputs.repository }}
      PICKET_ORACLE_STATE: ${{ inputs.state }}
      PICKET_INCLUDE_LOCATIONS: ${{ inputs['include-locations'] }}
      PICKET_COMPARE_CURRENT_CHECKOUT: ${{ inputs['compare-current-checkout'] }}
      PICKET_FAIL_ON_DIFFERENCE: ${{ inputs['fail-on-difference'] }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Restore
        run: dotnet restore Picket.slnx

      - name: Capture and compare oracle
        id: oracle
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PICKET_GITHUB_SECRET_SCANNING_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw 'PICKET_GITHUB_SECRET_SCANNING_PAT is not configured.'
          }

          $artifactDirectory = Join-Path $env:RUNNER_TEMP 'picket-github-secret-scanning-oracle'
          New-Item -ItemType Directory -Force -Path $artifactDirectory | Out-Null
          $oraclePath = Join-Path $artifactDirectory 'alerts.json'
          $picketReportPath = Join-Path $artifactDirectory 'picket-git.jsonl'
          $comparisonPath = Join-Path $artifactDirectory 'comparison.json'

          $captureArgs = @(
            '-Repository', $env:PICKET_ORACLE_REPOSITORY,
            '-State', $env:PICKET_ORACLE_STATE,
            '-OutputPath', $oraclePath
          )
          if ($env:PICKET_INCLUDE_LOCATIONS.Equals('true', [System.StringComparison]::OrdinalIgnoreCase)) {
            $captureArgs += '-IncludeLocations'
          }

          dotnet build ./scripts/Capture-GitHubSecretScanningOracle.cs --nologo --verbosity quiet
          dotnet run --file ./scripts/Capture-GitHubSecretScanningOracle.cs --no-build -- @captureArgs
          $oracle = Get-Content -Raw -LiteralPath $oraclePath | ConvertFrom-Json
          $alertCount = [int]$oracle.AlertCount
          $picketFindingCount = ''
          $missingLocationCount = ''
          $unexpectedLocationCount = ''
          $unmappedAlertTypeCount = ''

          if ($env:PICKET_COMPARE_CURRENT_CHECKOUT.Equals('true', [System.StringComparison]::OrdinalIgnoreCase)) {
            dotnet run --project src/Picket.Cli/Picket.Cli.csproj --configuration Release -- git . --profile picket --report-format jsonl --report-path $picketReportPath --redact=100 --exit-code 0 --timeout 300
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $compareArgs = @(
              '-OraclePath', $oraclePath,
              '-PicketReportPath', $picketReportPath,
              '-OutputPath', $comparisonPath
            )
            if ($env:PICKET_FAIL_ON_DIFFERENCE.Equals('true', [System.StringComparison]::OrdinalIgnoreCase)) {
              $compareArgs += '-FailOnDifference'
            }

            dotnet build ./scripts/Compare-GitHubSecretScanningOracle.cs --nologo --verbosity quiet
            dotnet run --file ./scripts/Compare-GitHubSecretScanningOracle.cs --no-build -- @compareArgs
            $comparison = Get-Content -Raw -LiteralPath $comparisonPath | ConvertFrom-Json
            $picketFindingCount = [string]$comparison.PicketFindingCount
            $missingLocationCount = [string]$comparison.MissingLocationCount
            $unexpectedLocationCount = [string]$comparison.UnexpectedLocationCount
            $unmappedAlertTypeCount = [string]$comparison.UnmappedAlertTypeCount
          }

          "oracle-path=$oraclePath" >> $env:GITHUB_OUTPUT
          "picket-report-path=$picketReportPath" >> $env:GITHUB_OUTPUT
          "comparison-path=$comparisonPath" >> $env:GITHUB_OUTPUT
          "alert-count=$alertCount" >> $env:GITHUB_OUTPUT

          $summary = @(
            '# GitHub secret scanning oracle',
            '',
            '| Field | Value |',
            '| --- | --- |',
            "| Repository | $env:PICKET_ORACLE_REPOSITORY |",
            "| State | $env:PICKET_ORACLE_STATE |",
            "| Include locations | $env:PICKET_INCLUDE_LOCATIONS |",
            "| Hosted alerts | $alertCount |",
            "| Compared checkout | $env:PICKET_COMPARE_CURRENT_CHECKOUT |"
          )
          if ($env:PICKET_COMPARE_CURRENT_CHECKOUT.Equals('true', [System.StringComparison]::OrdinalIgnoreCase)) {
            $summary += @(
              "| Picket findings | $picketFindingCount |",
              "| Missing mapped locations | $missingLocationCount |",
              "| Unexpected mapped locations | $unexpectedLocationCount |",
              "| Unmapped hosted alert types | $unmappedAlertTypeCount |"
            )
          }

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload sanitized oracle artifacts
        if: ${{ always() && steps.oracle.outputs['oracle-path'] != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: picket-github-secret-scanning-oracle
          path: |
            ${{ steps.oracle.outputs['oracle-path'] }}
            ${{ steps.oracle.outputs['picket-report-path'] }}
            ${{ steps.oracle.outputs['comparison-path'] }}
          if-no-files-found: ignore
