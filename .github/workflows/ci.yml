name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build and test (${{ matrix.rid }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-26-intel
            rid: osx-x64
          - os: macos-26
            rid: osx-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Set up Node
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 20

      - name: Install Azure DevOps packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        working-directory: azure-devops
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Restore
        run: dotnet restore Picket.slnx --locked-mode

      - name: Install Linux musl Native AOT dependencies
        if: matrix.rid == 'linux-x64' || matrix.rid == 'linux-arm64'
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::ForceIPv4=true install -y musl-tools zstd

      - name: Build Linux musl zstandard runtime
        if: matrix.rid == 'linux-x64' || matrix.rid == 'linux-arm64'
        shell: pwsh
        run: |
          $muslRid = if ('${{ matrix.rid }}' -eq 'linux-x64') { 'linux-musl-x64' } else { 'linux-musl-arm64' }
          $outputDirectory = Join-Path $env:RUNNER_TEMP "picket-zstd-$muslRid"
          dotnet run --file ./scripts/Build-ZstandardMusl.cs -- -OutputDirectory $outputDirectory
          "PICKET_ZSTANDARD_MUSL_LIBRARY=$(Join-Path $outputDirectory 'libzstd.so')" >> $env:GITHUB_ENV

      - name: Verify formatting
        run: dotnet format Picket.slnx --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build Picket.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution Picket.slnx --configuration Release --no-restore

      - name: Test Azure DevOps task
        run: node --test azure-devops/tasks/PicketScanV1/index.test.js

      - name: Publish Native AOT binaries
        shell: pwsh
        run: |
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-native-${{ matrix.rid }}"
          dotnet publish src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r ${{ matrix.rid }} --no-restore -o $publishOutput
          dotnet publish src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r ${{ matrix.rid }} --no-restore -o $publishOutput

      - name: Publish Linux musl Native AOT binaries
        if: matrix.rid == 'linux-x64' || matrix.rid == 'linux-arm64'
        shell: pwsh
        run: |
          $muslRid = if ('${{ matrix.rid }}' -eq 'linux-x64') { 'linux-musl-x64' } else { 'linux-musl-arm64' }
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-native-$muslRid"
          dotnet publish src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r $muslRid --no-restore -o $publishOutput
          dotnet publish src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r $muslRid --no-restore -o $publishOutput

      - name: Smoke test Linux musl zstandard scan
        if: matrix.rid == 'linux-x64' || matrix.rid == 'linux-arm64'
        shell: pwsh
        run: |
          $muslRid = if ('${{ matrix.rid }}' -eq 'linux-x64') { 'linux-musl-x64' } else { 'linux-musl-arm64' }
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-native-$muslRid"
          $fixtureDirectory = Join-Path $env:RUNNER_TEMP "picket-zstd-smoke-$muslRid"
          $sourcePath = Join-Path $fixtureDirectory 'secret.txt'
          $archivePath = "$sourcePath.zst"
          New-Item -ItemType Directory -Force -Path $fixtureDirectory | Out-Null
          Set-Content -LiteralPath $sourcePath -NoNewline -Encoding utf8NoBOM -Value ('aws_access_key_id = ' + 'AKIA' + 'ABCDEFGHIJKLMNOP')
          & zstd -q -f $sourcePath -o $archivePath
          if ($LASTEXITCODE -ne 0) {
            throw "zstd fixture creation failed with exit code $LASTEXITCODE."
          }

          $scanOutput = & (Join-Path $publishOutput 'picket') scan $archivePath --report-format jsonl --redact=100 2>&1
          $scanExitCode = $LASTEXITCODE
          if ($scanExitCode -ne 1) {
            throw "musl zstandard scan returned exit code $scanExitCode."
          }

          if (($scanOutput -join "`n") -notmatch '"ruleId":"aws-access-token"') {
            throw 'musl zstandard scan did not report the expected finding.'
          }

      - name: Pack public packages
        shell: pwsh
        run: |
          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-packages'
          New-Item -ItemType Directory -Force -Path $packageOutput | Out-Null

          dotnet pack src/Picket.Rules/Picket.Rules.csproj --configuration Release --no-build -o $packageOutput
          dotnet pack src/Picket.Engine/Picket.Engine.csproj --configuration Release --no-build -o $packageOutput
          dotnet pack src/Picket.Report/Picket.Report.csproj --configuration Release --no-build -o $packageOutput
          dotnet pack src/Picket.Security/Picket.Security.csproj --configuration Release --no-build -o $packageOutput
          dotnet pack src/Picket.Cli/Picket.Cli.csproj --configuration Release --no-build -p:IncludeSymbols=false -o $packageOutput
          dotnet pack src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release --no-build -p:IncludeSymbols=false -o $packageOutput
          dotnet pack src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r ${{ matrix.rid }} --no-restore -o $packageOutput
          dotnet pack src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r ${{ matrix.rid }} --no-restore -o $packageOutput

          if ('${{ matrix.rid }}' -eq 'linux-x64' -or '${{ matrix.rid }}' -eq 'linux-arm64') {
            $muslRid = if ('${{ matrix.rid }}' -eq 'linux-x64') { 'linux-musl-x64' } else { 'linux-musl-arm64' }
            dotnet pack src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r $muslRid --no-restore -o $packageOutput
            dotnet pack src/Picket.Tui.Cli/Picket.Tui.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r $muslRid --no-restore -o $packageOutput
          }

      - name: Validate Azure DevOps VSIX package
        if: matrix.os == 'ubuntu-latest'
        working-directory: azure-devops
        run: npm exec -- tfx extension create --manifest-globs vss-extension.json --output-path "${{ runner.temp }}/azure-devops-extension" --rev-version false

      - name: Picket scan
        id: picket-scan
        uses: ./
        with:
          path: .
          cache: "false"
          report-directory: ${{ runner.temp }}/picket-scan
          fail-on: never
          summary: "true"
          upload-sarif: "false"
          annotations: "false"
          setup-dotnet: "false"

      - name: Verify Picket scan outputs
        shell: pwsh
        run: |
          $findings = [int]'${{ steps.picket-scan.outputs.findings }}'
          if ($findings -le 0) {
            throw 'Picket scan reported no findings.'
          }

          $reportDirectory = Join-Path $env:RUNNER_TEMP 'picket-scan'
          foreach ($fileName in @('picket.sarif', 'picket.jsonl')) {
            $path = Join-Path $reportDirectory $fileName
            if (!(Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Picket scan did not write $fileName."
            }
          }
