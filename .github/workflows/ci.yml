name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-26
            rid: osx-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            9.0.x
            10.0.301

      - name: Restore
        run: dotnet restore Picket.slnx

      - name: Verify formatting
        run: dotnet format Picket.slnx --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build Picket.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution Picket.slnx --configuration Release --no-restore

      - name: Publish Native AOT CLI
        shell: pwsh
        run: |
          $publishOutput = Join-Path $env:RUNNER_TEMP "picket-native-${{ matrix.rid }}"
          dotnet publish src/Picket.Cli/Picket.Cli.csproj --configuration Release -p:PublishProfile=release-speed -r ${{ matrix.rid }} --no-restore -o $publishOutput

      - name: Pack public packages
        shell: pwsh
        run: |
          $packageOutput = Join-Path $env:RUNNER_TEMP 'picket-packages'
          New-Item -ItemType Directory -Force -Path $packageOutput | Out-Null

          dotnet pack src/Picket.Rules/Picket.Rules.csproj --configuration Release --no-build -o $packageOutput
          dotnet pack src/Picket.Engine/Picket.Engine.csproj --configuration Release --no-build -o $packageOutput
          dotnet pack src/Picket.Report/Picket.Report.csproj --configuration Release --no-build -o $packageOutput
          dotnet pack src/Picket.Security/Picket.Security.csproj --configuration Release --no-build -o $packageOutput

      - name: Smoke test GitHub Action
        id: action-smoke
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: ./
        with:
          path: tests/fixtures/github-secret-scanning
          cache: "false"
          report-directory: ${{ runner.temp }}/picket-action-smoke
          fail-on: never
          upload-sarif: "false"
          annotations: "false"
          setup-dotnet: "false"

      - name: Verify GitHub Action smoke outputs
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: pwsh
        run: |
          if ('${{ steps.action-smoke.outputs.exit-code }}' -ne '0') {
            throw "GitHub Action smoke returned exit code ${{ steps.action-smoke.outputs.exit-code }}."
          }

          if ('${{ steps.action-smoke.outputs.findings }}' -ne '0') {
            throw "GitHub Action smoke reported ${{ steps.action-smoke.outputs.findings }} findings."
          }

          $reportDirectory = Join-Path $env:RUNNER_TEMP 'picket-action-smoke'
          foreach ($fileName in @('picket.sarif', 'picket.jsonl')) {
            $path = Join-Path $reportDirectory $fileName
            if (!(Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "GitHub Action smoke did not write $fileName."
            }
          }
