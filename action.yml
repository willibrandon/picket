name: Picket
description: Scan a repository with Picket and publish SARIF-ready results.
author: Picket

inputs:
  path:
    description: Repository path to scan.
    required: false
    default: .
  config-path:
    description: Optional Gitleaks-compatible config path.
    required: false
    default: ""
  baseline-path:
    description: Optional Gitleaks-compatible baseline path.
    required: false
    default: ""
  rule-packs:
    description: Optional comma-separated built-in rule packs. Values are picket-strict and picket-experimental.
    required: false
    default: ""
  cache:
    description: Restore and save the native Picket scan cache.
    required: false
    default: "true"
  cache-mode:
    description: Native scan cache storage mode. Use secret-hash-only for public CI safety or raw for exact cached report replay in trusted jobs.
    required: false
    default: secret-hash-only
  cache-path:
    description: Native Picket scan cache directory.
    required: false
    default: .picket/cache
  cache-key:
    description: Optional explicit cache key.
    required: false
    default: ""
  report-directory:
    description: Directory where SARIF and JSONL reports are written.
    required: false
    default: picket-results
  fail-on:
    description: Failure mode. Use findings, errors, or never.
    required: false
    default: findings
  summary:
    description: Write the Picket scan job summary.
    required: false
    default: "true"
  results:
    description: Optional comma-separated validation result states to keep before reports, annotations, and failure enforcement.
    required: false
    default: ""
  only-verified:
    description: Keep only structurally valid offline findings and active live-verification findings.
    required: false
    default: "false"
  upload-sarif:
    description: Upload the SARIF report through GitHub code scanning.
    required: false
    default: "false"
  annotations:
    description: Emit safe GitHub workflow annotations from JSONL findings.
    required: false
    default: "true"
  annotation-limit:
    description: Maximum number of workflow annotations to emit.
    required: false
    default: "50"
  redact:
    description: Redaction percentage from 0 through 100. Defaults to full redaction for public CI safety.
    required: false
    default: "100"
  max-target-megabytes:
    description: Optional maximum file size in decimal MB for content rules.
    required: false
    default: ""
  timeout:
    description: Optional scan timeout in seconds. Use 0 to disable.
    required: false
    default: ""
  max-archive-depth:
    description: Optional maximum nested archive traversal depth. Use 0 to disable.
    required: false
    default: ""
  max-archive-entries:
    description: Optional maximum number of files extracted from archives. Use 0 to disable.
    required: false
    default: ""
  max-archive-megabytes:
    description: Optional maximum decompressed archive payload in decimal MB.
    required: false
    default: ""
  max-archive-ratio:
    description: Optional maximum archive expansion ratio. Use 0 to disable.
    required: false
    default: ""
  dotnet-version:
    description: .NET SDK version used to run the source-based action.
    required: false
    default: 10.0.301
  setup-dotnet:
    description: Install the configured .NET SDK before running Picket.
    required: false
    default: "true"

outputs:
  exit-code:
    description: Raw Picket scanner exit code.
    value: ${{ steps.run.outputs.exit-code }}
  findings:
    description: Number of JSONL finding records emitted by Picket.
    value: ${{ steps.run.outputs.findings }}
  sarif-path:
    description: SARIF report path.
    value: ${{ steps.run.outputs.sarif-path }}
  jsonl-path:
    description: JSONL report path.
    value: ${{ steps.run.outputs.jsonl-path }}
  annotations:
    description: Number of workflow annotations emitted.
    value: ${{ steps.run.outputs.annotations }}

runs:
  using: composite
  steps:
    - name: Set up .NET
      if: ${{ inputs.setup-dotnet == 'true' }}
      uses: actions/setup-dotnet@v5.4.0
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Restore Picket
      shell: pwsh
      working-directory: ${{ github.action_path }}
      run: dotnet restore "$env:GITHUB_ACTION_PATH/Picket.slnx" --locked-mode

    - name: Restore scan cache
      id: cache-restore
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ inputs.cache-key != '' && inputs.cache-key || format('picket-{0}-{1}-{2}-{3}', runner.os, inputs.cache-mode, github.ref_name, github.sha) }}
        restore-keys: |
          ${{ inputs.cache-key != '' && inputs.cache-key || format('picket-{0}-{1}-{2}-', runner.os, inputs.cache-mode, github.ref_name) }}
          picket-${{ runner.os }}-${{ inputs.cache-mode }}-

    - name: Run Picket
      id: run
      shell: pwsh
      working-directory: ${{ github.action_path }}
      env:
        PICKET_PATH: ${{ inputs.path }}
        PICKET_CONFIG_PATH: ${{ inputs.config-path }}
        PICKET_BASELINE_PATH: ${{ inputs.baseline-path }}
        PICKET_RULE_PACKS: ${{ inputs.rule-packs }}
        PICKET_CACHE_ENABLED: ${{ inputs.cache }}
        PICKET_CACHE_MODE: ${{ inputs.cache-mode }}
        PICKET_CACHE_PATH: ${{ inputs.cache-path }}
        PICKET_REPORT_DIRECTORY: ${{ inputs.report-directory }}
        PICKET_FAIL_ON: ${{ inputs.fail-on }}
        PICKET_SUMMARY: ${{ inputs.summary }}
        PICKET_RESULTS: ${{ inputs.results }}
        PICKET_ONLY_VERIFIED: ${{ inputs.only-verified }}
        PICKET_ANNOTATIONS: ${{ inputs.annotations }}
        PICKET_ANNOTATION_LIMIT: ${{ inputs.annotation-limit }}
        PICKET_REDACT: ${{ inputs.redact }}
        PICKET_MAX_TARGET_MEGABYTES: ${{ inputs.max-target-megabytes }}
        PICKET_TIMEOUT: ${{ inputs.timeout }}
        PICKET_MAX_ARCHIVE_DEPTH: ${{ inputs.max-archive-depth }}
        PICKET_MAX_ARCHIVE_ENTRIES: ${{ inputs.max-archive-entries }}
        PICKET_MAX_ARCHIVE_MEGABYTES: ${{ inputs.max-archive-megabytes }}
        PICKET_MAX_ARCHIVE_RATIO: ${{ inputs.max-archive-ratio }}
      run: |
        dotnet build "$env:GITHUB_ACTION_PATH/.github/actions/run-picket.cs" --nologo --verbosity quiet
        dotnet run --file "$env:GITHUB_ACTION_PATH/.github/actions/run-picket.cs" --no-build

    - name: Save scan cache
      if: ${{ inputs.cache == 'true' && steps.cache-restore.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ inputs.cache-key != '' && inputs.cache-key || format('picket-{0}-{1}-{2}-{3}', runner.os, inputs.cache-mode, github.ref_name, github.sha) }}

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' && steps.run.outputs.sarif-path != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.run.outputs.sarif-path }}

    - name: Enforce fail mode
      if: ${{ steps.run.outputs.should-fail == 'true' }}
      shell: pwsh
      env:
        PICKET_FAILURE_CODE: ${{ steps.run.outputs.failure-code }}
      run: exit ([int]$env:PICKET_FAILURE_CODE)
