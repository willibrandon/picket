trigger:
- main

pr:
- main

pool:
  name: Windows-SelfHosted
  demands:
  - Agent.OS -equals Windows_NT

variables:
  buildConfiguration: Release
  cliPublishDirectory: $(Pipeline.Workspace)\picket-cli
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

steps:
- checkout: self
  fetchDepth: 0

- task: UseDotNet@2
  displayName: Use .NET SDK
  inputs:
    packageType: sdk
    version: 10.0.301

- pwsh: dotnet restore Picket.slnx
  displayName: Restore

- pwsh: dotnet build Picket.slnx --configuration $(buildConfiguration) --no-restore
  displayName: Build

- pwsh: dotnet test --solution Picket.slnx --configuration $(buildConfiguration) --no-build --verbosity minimal
  displayName: Test

- pwsh: >
    dotnet publish src/Picket.Cli/Picket.Cli.csproj --configuration $(buildConfiguration) --framework net10.0 --no-restore --output "$(cliPublishDirectory)" -p:PublishAot=false -p:SelfContained=false -p:UseAppHost=true
  displayName: Publish local Picket CLI

- pwsh: |
    & "$(cliPublishDirectory)\picket.exe" version
  displayName: Verify local Picket CLI

- task: PicketScan@1
  name: picketScan
  displayName: Picket extension smoke test
  inputs:
    target: $(Build.SourcesDirectory)
    picketPath: $(cliPublishDirectory)\picket.exe
    profile: picket
    reportFormats: sarif,jsonl,html
    reportDirectory: $(Build.ArtifactStagingDirectory)\picket
    failOn: never
    redact: 100
    cache: false
    annotations: true
    annotationLimit: 25
    publishSarif: true
    publishJsonl: true
    publishHtml: true

- pwsh: |
    $reports = @(
        "$(Build.ArtifactStagingDirectory)\picket\picket.sarif",
        "$(Build.ArtifactStagingDirectory)\picket\picket.jsonl",
        "$(Build.ArtifactStagingDirectory)\picket\picket.html")
    foreach ($report in $reports) {
        if (-not (Test-Path -LiteralPath $report -PathType Leaf)) {
            throw "Missing Picket report: $report"
        }
    }

    Write-Host "Picket findings: $(picketScan.findings)"
    Write-Host "Picket annotations: $(picketScan.annotations)"
  displayName: Verify Picket extension outputs
